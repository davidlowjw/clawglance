[platformio]
src_dir = main
include_dir = main

[env:esp32s3]
platform = espressif32@6.8.1
board = esp32-s3-devkitc-1
framework = espidf

upload_port = /dev/cu.usbmodem21201
monitor_port = /dev/cu.usbmodem21201
monitor_speed = 115200

board_build.partitions = partitions.csv
board_build.flash_mode = dio
board_build.flash_size = 8MB
board_build.f_flash = 80000000L

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_DEMO_CONF_INCLUDE_SIMPLE
    -DCG_BOARD_S3

board_build.cmake_extra_args =
    -DEXTRA_COMPONENT_DIRS=${PROJECT_DIR}/components
    -DSDKCONFIG_DEFAULTS=${PROJECT_DIR}/sdkconfig.defaults

[env:cyd]
; Classic CYD: ESP32-2432S028R, ESP32-WROOM, 4MB flash, ILI9341 320x240 landscape, XPT2046 touch
platform = espressif32@6.8.1
board = esp32dev
framework = espidf

upload_port = /dev/cu.usbserial-2120
monitor_port = /dev/cu.usbserial-2120
monitor_speed = 115200

board_build.partitions = cyd_partitions.csv
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.f_flash = 40000000L

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_DEMO_CONF_INCLUDE_SIMPLE
    -DCG_BOARD_CYD

board_build.cmake_extra_args =
    -DEXTRA_COMPONENT_DIRS=${PROJECT_DIR}/components
    -DSDKCONFIG_DEFAULTS=${PROJECT_DIR}/sdkconfig.cyd.defaults

