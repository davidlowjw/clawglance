[platformio]
src_dir = main
include_dir = main

[env:s3-35-st7796s]
; ESP32-S3 3.5" board, ST7796S 480x320, capacitive touch, 8MB flash + 8MB PSRAM
platform = espressif32@6.8.1
board = esp32-s3-devkitc-1
framework = espidf

upload_port = /dev/cu.usbmodem21201
monitor_port = /dev/cu.usbmodem21201
monitor_speed = 115200

board_build.partitions = partitions.csv
board_build.flash_mode = dio
board_build.flash_size = 8MB
board_build.f_flash = 80000000L

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_DEMO_CONF_INCLUDE_SIMPLE
    -DCG_BOARD_S3

board_build.cmake_extra_args =
    -DEXTRA_COMPONENT_DIRS=${PROJECT_DIR}/components
    -DSDKCONFIG_DEFAULTS=${PROJECT_DIR}/sdkconfig.defaults

